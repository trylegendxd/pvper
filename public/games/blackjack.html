<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blackjack · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  :root {
    --bj-stage1: #1a2a39;
    --bj-stage2: #0d161f;
    --bj-panel:  #1c2836;
    --bj-panel2: #243240;
    --bj-line:   rgba(255,255,255,.08);
    --bj-green:  #169c46;
    --bj-green2: #1fcf5b;
    --bj-red:    #e23b4e;
    --bj-gold:   #d8a32e;
  }
  .bj-wrap { max-width: 560px; margin: 16px auto 90px; padding: 0 14px; }
  .bj-head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
  .bj-head .title { font-size: 22px; letter-spacing: 4px; color:#fff; }
  .bj-head .sub   { color: var(--dim); font-size: 11px; letter-spacing: 1px; }

  /* ── Stage / felt ─────────────────────────────────────────────── */
  .bj-stage {
    position: relative;
    background: radial-gradient(125% 90% at 50% -8%, var(--bj-stage1) 0%, #122030 55%, var(--bj-stage2) 100%);
    border: 1px solid var(--bj-line);
    border-radius: 14px;
    min-height: 430px;
    overflow: hidden;
    box-shadow: inset 0 0 70px rgba(0,0,0,.5), 0 12px 34px rgba(0,0,0,.45);
    padding: 16px;
  }

  /* Deck shoe — stacked blue card-backs, top-right */
  .bj-shoe {
    position: absolute; top: 14px; right: 16px; z-index: 1;
    width: 58px; height: 76px; border-radius: 7px;
    background: linear-gradient(135deg, #3173f4 0%, #2150bf 100%);
    border: 2px solid rgba(255,255,255,.28);
    box-shadow: 0 5px 14px rgba(0,0,0,.55);
  }
  .bj-shoe::before, .bj-shoe::after {
    content:''; position:absolute; inset:-2px; border-radius:7px;
    background: linear-gradient(135deg, #3173f4, #2150bf);
    border: 2px solid rgba(255,255,255,.2); z-index:-1;
  }
  .bj-shoe::before { transform: translate(4px,4px); opacity:.65; }
  .bj-shoe::after  { transform: translate(8px,8px); opacity:.38; }
  .bj-shoe .glyph {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#c4d8ff; font-size:22px; text-shadow:0 1px 2px rgba(0,0,0,.5);
  }

  /* Faint printed felt text */
  .bj-felt-text {
    position:absolute; top:48%; left:50%; transform:translate(-50%,-50%);
    text-align:center; pointer-events:none; width:88%; z-index:0;
  }
  .bj-felt-text .l1 {
    color: rgba(255,255,255,.13); letter-spacing:3px; font-weight:700; font-size:15px;
  }
  .bj-felt-text .line {
    height:1px; margin:10px auto; width:70%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
  }
  .bj-felt-text .l2 {
    color: rgba(255,255,255,.09); letter-spacing:2px; font-size:10px;
  }

  /* Hand rows */
  .bj-dealer  { position:absolute; top:50px;  left:0; right:0; display:flex; justify-content:center; z-index:2; }
  .bj-players { position:absolute; bottom:16px; left:0; right:0; display:flex; justify-content:center; gap:30px; z-index:2; flex-wrap:wrap; }

  .bj-hand { position:relative; }
  /* the value pill above each hand */
  .bj-pill {
    position:absolute; top:-15px; left:50%; transform:translateX(-50%); z-index:60;
    padding:3px 13px; border-radius:13px; font-weight:700; font-size:14px;
    background:#2c3c4c; color:#fff; box-shadow:0 2px 7px rgba(0,0,0,.55);
    min-width:26px; text-align:center; white-space:nowrap;
  }
  .bj-hand.is-player  .bj-pill { background: var(--bj-red); }
  .bj-hand.is-win     .bj-pill { background: var(--bj-green); }
  .bj-hand.is-lose    .bj-pill { background: #36495a; color:#9fb2c4; }
  .bj-hand.is-push    .bj-pill { background: var(--bj-gold); color:#1c1406; }

  /* Card fan container — sized in JS to wrap absolutely-placed cards */
  .bj-fan { position:relative; }
  .bj-card {
    position:absolute; width:60px; height:84px; border-radius:7px;
    background:#fdfdfd; color:#16202b; box-sizing:border-box; padding:5px 6px;
    box-shadow:0 5px 12px rgba(0,0,0,.55);
    font-family:'Georgia','Times New Roman',serif; font-weight:700;
    display:flex; flex-direction:column; justify-content:space-between;
    backface-visibility:hidden;
  }
  .bj-card .r-top    { font-size:15px; line-height:1; }
  .bj-card .r-suit   { align-self:center; font-size:22px; line-height:1; margin-top:-4px; }
  .bj-card .r-bot    { font-size:15px; line-height:1; align-self:flex-end; transform:rotate(180deg); }
  .bj-card.red       { color:#d11f38; }
  .bj-card.back {
    background:
      repeating-linear-gradient(45deg,#2a56c8 0 8px,#3a6fe0 8px 16px);
    border:2px solid rgba(255,255,255,.32);
  }
  .bj-card.deal    { animation: bjDeal .5s cubic-bezier(.22,1.15,.34,1) backwards; }
  .bj-card.flip    { animation: bjFlip .5s cubic-bezier(.4,0,.2,1) backwards; }
  @keyframes bjDeal {
    0%   { transform: translate(180px,-150px) rotate(-18deg) scale(.85); opacity:0; }
    60%  { opacity:1; }
    100% { transform: translate(0,0) rotate(0) scale(1); opacity:1; }
  }
  @keyframes bjFlip {
    0%   { transform: rotateY(90deg) scale(.92); opacity:0; }
    40%  { opacity:1; }
    100% { transform: rotateY(0) scale(1); opacity:1; }
  }
  /* Player hands carry a coloured glow — red while live, recoloured by
     outcome once settled. The focused split hand glows strongest. */
  .bj-players .bj-fan        { filter: drop-shadow(0 0 7px rgba(226,59,78,.5)); }
  .bj-hand.is-win  .bj-fan   { filter: drop-shadow(0 0 9px rgba(31,207,91,.65)); }
  .bj-hand.is-push .bj-fan   { filter: drop-shadow(0 0 9px rgba(216,163,46,.6)); }
  .bj-hand.is-lose .bj-fan   { filter: drop-shadow(0 0 6px rgba(120,140,160,.4)); }
  .bj-hand.is-focus .bj-fan  { filter: drop-shadow(0 0 13px rgba(226,59,78,.9)); }

  /* Result toast */
  .bj-result {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(.7);
    z-index:80; padding:12px 30px; border-radius:10px; text-align:center;
    font-weight:700; letter-spacing:3px; font-size:15px;
    background:rgba(8,14,20,.94); border:2px solid #2c3c4c; color:#fff;
    opacity:0; pointer-events:none; transition:opacity .25s, transform .35s cubic-bezier(.34,1.56,.64,1);
  }
  .bj-result.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
  .bj-result .amt { display:block; font-size:30px; margin-top:4px; }
  .bj-result.win  { border-color:var(--bj-green); color:#5fe08c; box-shadow:0 0 30px rgba(31,207,91,.4); }
  .bj-result.lose { border-color:#3a4a59; color:#ff8d8d; }
  .bj-result.push { border-color:var(--bj-gold); color:#ffd96b; }

  /* ── Action grid ──────────────────────────────────────────────── */
  .bj-actions {
    display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:16px 0 14px;
  }
  .bj-act {
    background: var(--bj-panel); border:1px solid var(--bj-line); color:#e8eef4;
    border-radius:8px; padding:16px 18px; cursor:pointer;
    font-family:inherit; font-size:16px; letter-spacing:1px;
    display:flex; align-items:center; justify-content:center; gap:10px;
    transition: background .12s, transform .08s, border-color .12s;
  }
  .bj-act .ic { font-size:17px; opacity:.85; }
  .bj-act:hover:not(:disabled) { background: var(--bj-panel2); transform:translateY(-1px); }
  .bj-act:active:not(:disabled) { transform:translateY(0); }
  .bj-act:disabled { opacity:.4; cursor:not-allowed; color:#6f8094; }

  /* ── Bet controls ─────────────────────────────────────────────── */
  .bj-betlabel {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:13px; color:var(--dim); letter-spacing:1px; margin-bottom:6px;
  }
  .bj-betlabel .bal { color:#fff; font-variant-numeric:tabular-nums; font-weight:700; }
  .bj-betrow { display:flex; gap:10px; margin-bottom:12px; }
  .bj-input { position:relative; flex:1; }
  .bj-input input {
    width:100%; box-sizing:border-box;
    background: var(--bj-panel); border:1px solid var(--bj-line); color:#fff;
    padding:14px 44px 14px 14px; font-size:18px; border-radius:8px;
    font-family:inherit; font-variant-numeric:tabular-nums;
  }
  .bj-input input:focus { outline:none; border-color: var(--bj-green2); }
  .bj-input .dollar {
    position:absolute; right:10px; top:50%; transform:translateY(-50%);
    width:26px; height:26px; border-radius:50%;
    background:#3fd07f; color:#06320f; font-weight:800; font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }
  .bj-quick {
    background: var(--bj-panel); border:1px solid var(--bj-line); color:#cdd9e5;
    border-radius:8px; min-width:58px; font-size:16px; cursor:pointer;
    font-family:inherit; letter-spacing:1px; transition: background .12s;
  }
  .bj-quick:hover { background: var(--bj-panel2); }
  .bj-bet {
    width:100%; border:0; border-radius:8px; cursor:pointer;
    background: linear-gradient(180deg, var(--bj-green2), var(--bj-green));
    color:#04220e; font-family:inherit; font-weight:700;
    font-size:19px; letter-spacing:2px; padding:16px;
    box-shadow:0 4px 0 rgba(0,0,0,.35); transition: filter .12s, transform .08s;
  }
  .bj-bet:hover:not(:disabled)  { filter:brightness(1.07); }
  .bj-bet:active:not(:disabled) { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.35); }
  .bj-bet:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }

  .bj-msg { margin-top:10px; padding:9px 12px; border-radius:6px; font-size:12px;
            letter-spacing:1px; display:none; }
  .bj-msg.ok    { background:rgba(31,207,91,.08); border:1px solid rgba(31,207,91,.4);  color:#5fe08c; display:block; }
  .bj-msg.error { background:rgba(226,59,78,.08); border:1px solid rgba(226,59,78,.45); color:#ff8d8d; display:block; }

  @media (max-width:480px){
    .bj-card { width:52px; height:74px; }
  }
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="bj-wrap">
  <div class="bj-head">
    <div class="title">BLACKJACK</div>
    <div class="sub">Dealer stands on 17 · BJ pays 3:2 · Split pairs · Double any two</div>
  </div>

  <div class="bj-stage" id="bj-stage">
    <div class="bj-shoe"><span class="glyph">♠</span></div>
    <div class="bj-felt-text" id="bj-felt-text">
      <div class="l1">BLACKJACK PAYS 3 TO 2</div>
      <div class="line"></div>
      <div class="l2">INSURANCE PAYS 2 TO 1 · DEALER STANDS ON ALL 17</div>
    </div>
    <div class="bj-dealer"  id="bj-dealer"></div>
    <div class="bj-players" id="bj-players"></div>
    <div class="bj-result"  id="bj-result"></div>
  </div>

  <div class="bj-actions">
    <button class="bj-act" id="act-hit"    disabled>Hit    <span class="ic">⬇</span></button>
    <button class="bj-act" id="act-stand"  disabled>Stand  <span class="ic">✋</span></button>
    <button class="bj-act" id="act-split"  disabled>Split  <span class="ic">🂠</span></button>
    <button class="bj-act" id="act-double" disabled>Double <span class="ic">⊙</span></button>
  </div>

  <div class="bj-betlabel">
    <span>Bet Amount</span>
    <span class="bal" id="bj-balance">0 cr</span>
  </div>
  <div class="bj-betrow">
    <div class="bj-input">
      <input type="number" id="bj-amount" min="5" step="5" value="100" placeholder="0">
      <span class="dollar">$</span>
    </div>
    <button class="bj-quick" id="bj-half" title="Halve bet">½</button>
    <button class="bj-quick" id="bj-2x"   title="Double bet">2×</button>
  </div>
  <button class="bj-bet" id="bj-bet">BET</button>

  <div class="bj-msg" id="bj-msg"></div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/blackjack.js"></script>
<script src="/js/music-player.js"></script>
</body>
</html>
