<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blackjack · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .table {
    background: radial-gradient(ellipse at top, #1b5a35 0%, #0e3a22 70%, #0a2615 100%);
    border: 6px solid #0d2716; border-radius: 14px;
    padding: 28px 24px 22px; min-height: 460px;
    display:flex; flex-direction:column; gap:18px;
    box-shadow: inset 0 0 60px rgba(0,0,0,.4);
    position: relative;
  }
  .seat { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .seat h3 { color:#fff; font-size:13px; letter-spacing:3px; opacity:.9; }
  .cards { display:flex; gap:8px; min-height: 124px; align-items:center; justify-content:center; }

  /* ── Card ─────────────────────────────────────────────────────── */
  .card-face {
    width: 70px; height: 98px; border-radius: 6px;
    background: #fff; color: #000; padding: 6px;
    display:flex; flex-direction:column; justify-content:space-between;
    font-family: 'Georgia', serif; font-weight: 700; font-size: 18px;
    box-shadow: 0 6px 14px rgba(0,0,0,.45);
    position: relative;
    transform-origin: top center;
    animation: dealIn .35s cubic-bezier(.22,1.18,.34,1) backwards;
  }
  @keyframes dealIn {
    from { transform: translate(-60px, -60px) rotate(-12deg); opacity: 0; }
    to   { transform: translate(0,0) rotate(0); opacity: 1; }
  }
  .card-face.hidden {
    background:
      linear-gradient(135deg, rgba(255,255,255,.08) 0 50%, transparent 50%),
      repeating-linear-gradient(45deg,#3a1d6b 0 10px,#5a3a8c 10px 20px);
    color: transparent;
    border: 2px solid #2a1255;
  }
  .card-face .bot { transform: rotate(180deg); align-self: flex-end; }
  .card-face.red { color: #c0142d; }
  .seat .val { color:#dceede; font-size:15px; letter-spacing:1px; font-weight:600; min-height: 20px; }

  /* ── Multi-hand seats row ─────────────────────────────────────── */
  .seats-row {
    display: grid; grid-template-columns: repeat(var(--seat-count, 1), 1fr);
    gap: 24px; align-items: start;
  }
  .player-seat {
    background: rgba(0,0,0,.18); border: 1px solid rgba(255,255,255,.07);
    border-radius: 8px; padding: 12px 10px;
    display: flex; flex-direction: column; gap: 8px; align-items: center;
    transition: border-color .2s ease, background .2s ease;
  }
  .player-seat.is-active { border-color: rgba(255,215,0,.45); background: rgba(255,215,0,.04); }
  .player-seat.is-bust   { border-color: rgba(255,90,90,.45); }
  .player-seat.is-win    { border-color: rgba(80,220,150,.5); background: rgba(80,220,150,.05); }
  .seat-tag {
    font-size:10px; letter-spacing:2px; color:#cdd; opacity:.8;
  }
  .seat-bet { color: #ffd84a; font-size: 13px; letter-spacing: 1px; font-weight: 600; }
  .seat-controls { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .seat-controls button {
    background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.18);
    color:#fff; padding:6px 12px; border-radius:3px; cursor:pointer;
    font-family:inherit; font-size:12px; letter-spacing:1px; font-weight:600;
  }
  .seat-controls button.green { border-color:#3fd07f; color:#3fd07f; }
  .seat-controls button.red   { border-color:#e63946; color:#e63946; }
  .seat-controls button.gold  { border-color:#ffd84a; color:#ffd84a; }
  .seat-controls button:hover { background: rgba(255,255,255,.06); }

  .banner {
    text-align:center; font-size:24px; letter-spacing:4px; font-weight:700;
    color:#fff; min-height:30px;
    text-shadow: 0 2px 6px rgba(0,0,0,.5);
  }
  .banner.win  { color: #4cf09e; }
  .banner.lose { color: #ff6f7a; }
  .banner.push { color: #ffd84a; }

  /* ── Chip rack + setup ────────────────────────────────────────── */
  .setup-panel {
    display:flex; flex-direction:column; gap:14px;
    background: rgba(0,0,0,.25); border:1px solid rgba(255,255,255,.08);
    border-radius:8px; padding:14px;
  }
  .chip-rack {
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
  }
  .chip {
    width: 56px; height: 56px; border-radius: 50%;
    border: 4px dashed rgba(255,255,255,.65);
    background: var(--chip-color, #444);
    color: #fff; font-weight: 700; font-size: 14px; letter-spacing: 0;
    display:flex; align-items:center; justify-content:center;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,.4), inset 0 -4px 4px rgba(0,0,0,.3);
    user-select: none;
    transition: transform .12s ease;
  }
  .chip:hover { transform: translateY(-3px); }
  .chip.c-5    { --chip-color: #f0f0f0; color:#222; }
  .chip.c-25   { --chip-color: #2b6fff; }
  .chip.c-100  { --chip-color: #1aa758; }
  .chip.c-500  { --chip-color: #6c2bff; }
  .chip.c-1000 { --chip-color: #ffae00; color:#222; }
  .chip-clear  { --chip-color: #b03030; }
  .seat-setup-row {
    display:flex; gap:12px; align-items:center; justify-content:space-between;
    padding:8px 12px; background:rgba(0,0,0,.25); border-radius:6px;
  }
  .seat-setup-row.is-selected { outline: 1px solid #ffd84a; }
  .seat-setup-row .ss-label { font-size:12px; letter-spacing:2px; color:#cdd; }
  .seat-setup-row .ss-bet  { font-size:18px; color:#ffd84a; font-weight:700; letter-spacing:1px; min-width:60px; text-align:right; }
  .seat-setup-row .ss-rm {
    background: rgba(0,0,0,.4); border:1px solid #b03030; color:#e63946;
    padding:3px 8px; border-radius:3px; cursor:pointer; font-size:11px;
  }
  .setup-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:4px; }
  .setup-actions button {
    background:#222; border:1px solid #555; color:#fff; padding:8px 14px;
    border-radius:3px; cursor:pointer; font-family:inherit; font-size:12px;
    letter-spacing:2px; font-weight:600;
  }
  .setup-actions button.primary { background:#1aa758; border-color:#1aa758; }
  .setup-actions button.primary:hover { background:#1ec56b; }
  .setup-actions button:disabled { opacity:.4; cursor:not-allowed; }
  .total-bet { text-align:center; font-size:12px; color:#cdd; letter-spacing:2px; }
  .total-bet b { color:#ffd84a; font-size:14px; }

  .center-line {
    text-align:center; color: rgba(255,255,255,.4); font-size: 11px;
    letter-spacing: 4px; padding: 6px 0; border-top: 1px dashed rgba(255,255,255,.15);
    border-bottom: 1px dashed rgba(255,255,255,.15);
  }
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">BLACKJACK</h1>
  <p class="subtitle">Dealer hits to 17 · Blackjack pays 3:2 · Push refunds · Double on first two cards. Up to 3 hands at once.</p>

  <div class="table" id="table">
    <div class="seat" id="dealer-seat">
      <h3>DEALER</h3>
      <div class="cards" id="dealer-cards"></div>
      <div class="val" id="dealer-val"></div>
    </div>
    <div class="center-line">— TABLE —</div>
    <div id="seats-row" class="seats-row" style="--seat-count:1"></div>
    <div id="setup-area"></div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/blackjack.js"></script>
</body>
</html>
