<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blackjack · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .table { background: #143a23; border: 6px solid #0d2716; border-radius: 12px;
           padding: 28px; min-height: 380px; display:flex; flex-direction:column; gap:24px; }
  .seat { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .seat h3 { color:#fff; font-size:14px; letter-spacing:2px; }
  .cards { display:flex; gap:10px; min-height: 120px; align-items:center; }
  .card-face {
    width: 78px; height: 108px; border-radius: 6px;
    background: #fff; color: #000; padding: 8px;
    display:flex; flex-direction:column; justify-content:space-between;
    font-family: serif; font-weight: 700; font-size: 22px;
    box-shadow: 0 4px 8px rgba(0,0,0,.3);
  }
  .card-face.hidden {
    background: repeating-linear-gradient(45deg,#3a1d6b 0 8px,#5a3a8c 8px 16px);
    color: transparent;
  }
  .card-face .bot { transform: rotate(180deg); align-self: flex-end; }
  .card-face.red { color: #c0142d; }
  .seat .val { color:#dceede; font-size:18px; letter-spacing:1px; }
  .controls { display:flex; gap:10px; justify-content:center; margin-top:10px; }
  .bet-row { display:flex;gap:10px; align-items:flex-end;}
  .bet-row input { width:120px;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:3px;font-family:var(--font);font-size:15px;outline:none; }
  .banner { text-align:center;font-size:24px;letter-spacing:4px;font-weight:700;color:#fff;min-height:36px; }
  .banner.win  { color: var(--green); }
  .banner.lose { color: var(--red); }
  .banner.push { color: var(--gold); }
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">BLACKJACK</h1>
  <p class="subtitle">Dealer hits to 17 · Blackjack pays 3:2 · Push refunds</p>

  <div class="table" id="table">
    <div class="seat" id="dealer-seat">
      <h3>DEALER</h3>
      <div class="cards" id="dealer-cards"></div>
      <div class="val" id="dealer-val"></div>
    </div>
    <div class="banner" id="banner"></div>
    <div class="seat" id="player-seat">
      <h3 id="player-name">PLAYER</h3>
      <div class="cards" id="player-cards"></div>
      <div class="val" id="player-val"></div>
    </div>
    <div class="controls" id="controls">
      <div class="bet-row">
        <div><label style="font-size:11px;color:#cdd; letter-spacing:1px;">BET</label>
          <input id="bet" type="number" min="1" value="25"></div>
        <button class="btn" id="deal-btn">DEAL</button>
      </div>
    </div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/blackjack.js"></script>
</body>
</html>
