<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
/* ─── Wheel ──────────────────────────────────────────────────────────── */
.wheel-area {
  display:flex; align-items:center; justify-content:center;
  background: var(--bg2); border:1px solid var(--border); border-radius:8px;
  padding: 18px; min-height: 320px; position: relative;
}
.wheel-wrap { position: relative; width: 280px; height: 280px; }
.wheel {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: radial-gradient(circle at center, #3a2913 0%, #1f1610 45%, #0e0a07 100%);
  border: 8px solid #7a5430;
  box-shadow: inset 0 0 16px rgba(0,0,0,.7), 0 6px 16px rgba(0,0,0,.6);
  transform-origin: center;
  transition: transform 5s cubic-bezier(.16,.78,.18,1);
}
.wheel .pocket {
  position: absolute; top: 0; left: 50%;
  width: 26px; height: 60px; margin-left: -13px;
  transform-origin: 50% 140px;        /* radius from center */
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 6px;
  font-size: 12px; font-weight: 700; color: #fff;
  font-family: 'Rajdhani', sans-serif;
  text-shadow: 0 1px 2px rgba(0,0,0,.8);
}
.wheel .pocket.red   { background: #c0142d; }
.wheel .pocket.black { background: #161616; }
.wheel .pocket.green { background: #128a3a; }
.wheel .pocket::after {
  /* angled gap between pockets */
  content: ''; position: absolute; inset: 0;
  border-left: 1px solid rgba(0,0,0,.6);
  border-right: 1px solid rgba(0,0,0,.6);
}
.wheel-center {
  position: absolute; top: 50%; left: 50%;
  width: 100px; height: 100px; margin: -50px 0 0 -50px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #b48650, #4a2c14 65%, #2a1a0a);
  box-shadow: inset -4px -4px 8px rgba(0,0,0,.6), 0 4px 8px rgba(0,0,0,.4);
}
/* Pointer at top */
.pointer {
  position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 20px solid #ffd84a;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.6));
  z-index: 5;
}
/* Ball — rotates in opposite direction at slower decel */
.ball-track {
  position: absolute; inset: 0; transform-origin: center;
  transition: transform 5s cubic-bezier(.18,.74,.18,1);
  pointer-events: none;
}
.ball-track::after {
  content: ''; position: absolute;
  top: 6px; left: 50%; transform: translateX(-50%);
  width: 12px; height: 12px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fff, #c9c9c9 70%);
  box-shadow: 0 1px 2px rgba(0,0,0,.4);
}
.last-numbers { display:flex; gap:4px; flex-wrap:wrap; margin-top:14px; justify-content:center; }
.last-numbers span {
  padding:4px 9px; font-size:12px; font-family:monospace; color:#fff; border-radius:2px; font-weight:700;
}

/* ─── Table ──────────────────────────────────────────────────────────── */
.table-wrap { background: var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px; }
.felt {
  background: #0f5a30;
  border: 6px solid #0a3a1f;
  border-radius: 8px;
  padding: 0;
  position: relative;
  user-select: none;
}
.row { display: grid; grid-template-columns: 38px repeat(12, 1fr) 50px; gap: 0; }
.zero {
  grid-row: 1 / span 3;
  background: #128a3a;
  border: 1px solid #0a3a1f;
  color: #fff; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif; font-size: 18px;
  position: relative;
}
.cell {
  border: 1px solid #0a3a1f;
  height: 44px;
  color: #fff; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  font-family: 'Rajdhani', sans-serif; font-size: 16px;
}
.cell.red   { background: #c0142d; }
.cell.black { background: #161616; }
.col-bet {
  grid-row: span 1;
  background: #094525;
  border: 1px solid #0a3a1f;
  color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size: 11px; font-weight:600; letter-spacing:1px; text-align:center;
}
.outside-row {
  display: grid; grid-template-columns: 38px repeat(12, 1fr) 50px;
  gap: 0;
}
.outside {
  border: 1px solid #0a3a1f; background: #094525;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; letter-spacing: 1px;
  font-family: 'Rajdhani', sans-serif; font-size: 13px;
  height: 36px;
  text-transform: uppercase;
  position: relative;
}
.outside.red   { background: #c0142d; }
.outside.black { background: #161616; }
.cell:hover, .zero:hover, .outside:hover, .col-bet:hover { outline: 2px solid #ffe066; z-index: 2; }

/* Chip stack on a bet */
.chip-stack {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 3;
}
.chip {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--chip-color, #4b9eff);
  color: #fff; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px dashed rgba(255,255,255,.85);
  box-shadow: 0 2px 4px rgba(0,0,0,.4), inset 0 0 0 2px var(--chip-color, #4b9eff);
  font-family: 'Rajdhani', sans-serif;
}

/* ─── Chip selector ──────────────────────────────────────────────────── */
.chip-bar {
  display:flex; gap:10px; padding:14px; background: var(--bg2);
  border:1px solid var(--border); border-radius:6px; margin-top: 12px;
  align-items:center; flex-wrap:wrap;
}
.chip-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px dashed rgba(255,255,255,.85);
  color: #fff; font-weight: 700; font-size: 13px;
  cursor: pointer; font-family: 'Rajdhani', sans-serif;
  box-shadow: inset 0 0 0 3px var(--chip-color);
  background: var(--chip-color);
  transition: transform .1s;
}
.chip-btn:hover { transform: scale(1.06); }
.chip-btn.active { box-shadow: 0 0 0 3px #ffe066, inset 0 0 0 3px var(--chip-color); }

.action-row { display:flex; gap:10px; margin-left:auto; align-items:center; }
.summary { font-size:13px; color:var(--dim); letter-spacing:1px; }
.summary b { color: var(--gold); font-size: 16px; }

.banner {
  margin-top: 10px; min-height: 22px; text-align:center;
  font-size: 15px; letter-spacing: 1.5px; font-weight: 600;
}
.banner.win  { color: var(--green); }
.banner.lose { color: var(--red); }

@media (max-width: 900px) {
  .cell { font-size: 13px; height: 36px; }
  .zero { font-size: 14px; }
}
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">ROULETTE</h1>
  <p class="subtitle">European wheel · single zero · crypto-secure RNG · place multiple chips per spin.</p>

  <div style="display:grid; grid-template-columns: 320px 1fr; gap:18px; align-items:start;">
    <div>
      <div class="wheel-area">
        <div class="wheel-wrap">
          <div class="pointer"></div>
          <div class="wheel" id="wheel"></div>
          <div class="ball-track" id="ball"></div>
          <div class="wheel-center"></div>
        </div>
      </div>
      <div class="last-numbers" id="history"></div>
    </div>

    <div class="table-wrap">
      <div class="felt" id="felt"></div>

      <div class="chip-bar">
        <button class="chip-btn active" data-amt="1"   style="--chip-color:#ffffff;color:#000">1</button>
        <button class="chip-btn"        data-amt="5"   style="--chip-color:#e63946">5</button>
        <button class="chip-btn"        data-amt="25"  style="--chip-color:#2ecc71">25</button>
        <button class="chip-btn"        data-amt="100" style="--chip-color:#222;color:#fff">100</button>
        <button class="chip-btn"        data-amt="500" style="--chip-color:#9b59b6">500</button>
        <span class="summary">TOTAL <b id="total-bet">0</b> cr</span>
        <div class="action-row">
          <button class="btn secondary small" id="clear-btn">CLEAR</button>
          <button class="btn secondary small" id="undo-btn">UNDO</button>
          <button class="btn gold" id="spin-btn" disabled>SPIN</button>
        </div>
      </div>
      <p class="banner" id="banner"></p>
    </div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/roulette.js"></script>
</body>
</html>
