<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
/* ─── Wheel ──────────────────────────────────────────────────────────── */
.wheel-area {
  display:flex; align-items:center; justify-content:center;
  background: var(--bg2); border:1px solid var(--border); border-radius:8px;
  padding: 24px; min-height: 340px; position: relative;
}
.wheel-wrap { position: relative; width: 300px; height: 300px; }

/* Canvas wheel — CSS rotation applied via JS */
#wheel {
  position: absolute; inset: 0;
  width: 300px; height: 300px;
  border-radius: 50%;
  transform-origin: center center;
  /* box-shadow provides the outer ring effect */
  box-shadow:
    0 0 0 6px #7a5020,
    0 0 0 10px #4a2e0e,
    0 0 0 12px #8a6030,
    0 14px 36px rgba(0,0,0,.85);
  will-change: transform;
}

/* Fixed notch at 12-o'clock (landing indicator) */
.wheel-notch {
  position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
  width: 10px; height: 14px;
  background: linear-gradient(to bottom, #ffe066, #c89020);
  border-radius: 0 0 4px 4px;
  box-shadow: 0 2px 6px rgba(0,0,0,.6);
  z-index: 6;
}

/* Ball orbits in the opposite direction */
.ball-track {
  position: absolute; inset: 0; transform-origin: center;
  will-change: transform;
  pointer-events: none;
}
.ball-track::after {
  content: ''; position: absolute;
  top: 8px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ffffff, #c0c0c0 60%, #888 100%);
  box-shadow: 0 2px 6px rgba(0,0,0,.7), inset 0 -2px 4px rgba(0,0,0,.3);
}

.last-numbers {
  display:flex; gap:5px; flex-wrap:wrap; margin-top:14px; justify-content:center;
}
.last-numbers span {
  padding:4px 10px; font-size:12px; font-family:monospace;
  color:#fff; border-radius:3px; font-weight:700;
  box-shadow: inset 0 1px 2px rgba(0,0,0,.4);
}

/* ─── Table ──────────────────────────────────────────────────────────── */
.table-wrap { background: var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px; }
.felt {
  background: #0f5a30;
  border: 6px solid #0a3a1f;
  border-radius: 8px;
  padding: 0;
  position: relative;
  user-select: none;
}
.row { display: grid; grid-template-columns: 38px repeat(12, 1fr) 50px; gap: 0; }
.zero {
  grid-row: 1 / span 3;
  background: #128a3a;
  border: 1px solid #0a3a1f;
  color: #fff; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif; font-size: 18px;
  position: relative;
}
.cell {
  border: 1px solid #0a3a1f;
  height: 44px;
  color: #fff; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
  font-family: 'Rajdhani', sans-serif; font-size: 16px;
}
.cell.red   { background: #c0142d; }
.cell.black { background: #161616; }
.col-bet {
  grid-row: span 1;
  background: #094525;
  border: 1px solid #0a3a1f;
  color:#fff; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size: 11px; font-weight:600; letter-spacing:1px; text-align:center;
}
.outside-row {
  display: grid; grid-template-columns: 38px repeat(12, 1fr) 50px;
  gap: 0;
}
.outside {
  border: 1px solid #0a3a1f; background: #094525;
  color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; letter-spacing: 1px;
  font-family: 'Rajdhani', sans-serif; font-size: 13px;
  height: 36px;
  text-transform: uppercase;
  position: relative;
}
.outside.red   { background: #c0142d; }
.outside.black { background: #161616; }
.cell:hover, .zero:hover, .outside:hover, .col-bet:hover { outline: 2px solid #ffe066; z-index: 2; }

/* Chip stack on a bet */
.chip-stack {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none; z-index: 3;
}
.chip {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--chip-color, #4b9eff);
  color: #fff; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px dashed rgba(255,255,255,.85);
  box-shadow: 0 2px 4px rgba(0,0,0,.4), inset 0 0 0 2px var(--chip-color, #4b9eff);
  font-family: 'Rajdhani', sans-serif;
}

/* ─── Chip selector ──────────────────────────────────────────────────── */
.chip-bar {
  display:flex; gap:10px; padding:14px; background: var(--bg2);
  border:1px solid var(--border); border-radius:6px; margin-top: 12px;
  align-items:center; flex-wrap:wrap;
}
.chip-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 3px dashed rgba(255,255,255,.85);
  color: #fff; font-weight: 700; font-size: 13px;
  cursor: pointer; font-family: 'Rajdhani', sans-serif;
  box-shadow: inset 0 0 0 3px var(--chip-color);
  background: var(--chip-color);
  transition: transform .1s;
}
.chip-btn:hover { transform: scale(1.06); }
.chip-btn.active { box-shadow: 0 0 0 3px #ffe066, inset 0 0 0 3px var(--chip-color); }

.action-row { display:flex; gap:10px; margin-left:auto; align-items:center; }
.summary { font-size:13px; color:var(--dim); letter-spacing:1px; }
.summary b { color: var(--gold); font-size: 16px; }

.banner {
  margin-top: 10px; min-height: 22px; text-align:center;
  font-size: 15px; letter-spacing: 1.5px; font-weight: 600;
}
.banner.win  { color: var(--green); }
.banner.lose { color: var(--red); }

@media (max-width: 900px) {
  .cell { font-size: 13px; height: 36px; }
  .zero { font-size: 14px; }
}
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">ROULETTE</h1>
  <p class="subtitle">European wheel · single zero · crypto-secure RNG · place multiple chips per spin.</p>

  <div style="display:grid; grid-template-columns: 348px 1fr; gap:18px; align-items:start;">
    <div>
      <div class="wheel-area">
        <div class="wheel-wrap">
          <div class="wheel-notch"></div>
          <canvas id="wheel" width="300" height="300"></canvas>
          <div class="ball-track" id="ball"></div>
        </div>
      </div>
      <div class="last-numbers" id="history"></div>
    </div>

    <div class="table-wrap">
      <div class="felt" id="felt"></div>

      <div class="chip-bar">
        <button class="chip-btn active" data-amt="1"   style="--chip-color:#ffffff;color:#000">1</button>
        <button class="chip-btn"        data-amt="5"   style="--chip-color:#e63946">5</button>
        <button class="chip-btn"        data-amt="25"  style="--chip-color:#2ecc71">25</button>
        <button class="chip-btn"        data-amt="100" style="--chip-color:#222;color:#fff">100</button>
        <button class="chip-btn"        data-amt="500" style="--chip-color:#9b59b6">500</button>
        <span class="summary">TOTAL <b id="total-bet">0</b> cr</span>
        <div class="action-row">
          <button class="btn secondary small" id="clear-btn">CLEAR</button>
          <button class="btn secondary small" id="undo-btn">UNDO</button>
          <button class="btn gold" id="spin-btn" disabled>SPIN</button>
        </div>
      </div>
      <p class="banner" id="banner"></p>
    </div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/roulette.js"></script>
</body>
</html>
