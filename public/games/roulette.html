<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Roulette · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .wheel { width:230px; height:230px; border-radius:50%; margin:24px auto; position:relative;
           background: conic-gradient(#222 0deg, #222 360deg); border: 6px solid #2a2a3a;
           display:flex; align-items:center; justify-content:center;
           transition: transform 4s cubic-bezier(.18,.74,.18,1); }
  .wheel .num { font-size:56px; font-weight:700; }
  .wheel .num.red   { color: var(--red); }
  .wheel .num.black { color: #cccccc; }
  .wheel .num.green { color: var(--green); }
  .bet-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; margin-top:10px; }
  .bet-grid .btn { width:100%; }
  .num-grid { display:grid; grid-template-columns: repeat(13, 1fr); gap:3px; margin-top:8px; }
  .num-grid .nb { padding:6px 0; text-align:center; border-radius:2px; cursor:pointer; font-size:11px; color:#fff; }
  .nb.red { background:#7a1f25; } .nb.black { background:#1b1b1b; } .nb.green { background:#194a30; }
  .nb.active { outline: 2px solid var(--accent); }
  .history-list { display:flex; gap:4px; flex-wrap:wrap; margin-top:10px; }
  .history-list span { padding:3px 8px; border-radius:2px; font-size:11px; color:#fff; font-family:monospace; }
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">ROULETTE</h1>
  <p class="subtitle">Crypto-secure RNG · vs house · play-money only</p>

  <div style="display:grid;grid-template-columns: 1fr 1fr; gap:20px;">
    <div class="card">
      <div class="wheel" id="wheel"><span class="num green" id="result-num">?</span></div>
      <div class="history-list" id="history"></div>
      <p class="status" style="text-align:center;color:var(--dim);font-size:12px;margin-top:8px" id="status">Place your bet.</p>
    </div>

    <div class="card">
      <h3 style="font-size:14px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;">PLACE BET</h3>
      <div class="bet-row" style="margin-bottom:14px;">
        <div>
          <label style="font-size:11px;color:var(--dim);letter-spacing:1px;">AMOUNT (cr)</label>
          <input id="amt" type="number" min="1" value="10"
                 style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:3px;font-family:var(--font);font-size:16px;width:140px;outline:none;">
        </div>
      </div>

      <div class="bet-grid">
        <button class="btn red" data-bet="red">RED (2×)</button>
        <button class="btn secondary" data-bet="black" style="background:#000;color:#fff;border:1px solid #444">BLACK (2×)</button>
        <button class="btn" data-bet="odd">ODD (2×)</button>
        <button class="btn" data-bet="even">EVEN (2×)</button>
        <button class="btn purple" data-bet="low">1-18 (2×)</button>
        <button class="btn purple" data-bet="high">19-36 (2×)</button>
      </div>

      <p style="font-size:11px;color:var(--dim);letter-spacing:1px;margin-top:14px;">SINGLE NUMBER (36×)</p>
      <div class="num-grid" id="num-grid"></div>
      <button class="btn gold" id="spin-number" style="width:100%;margin-top:10px" disabled>SPIN NUMBER (none selected)</button>
    </div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/roulette.js"></script>
</body>
</html>
