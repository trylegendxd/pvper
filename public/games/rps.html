<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .rps-board { display:flex; flex-direction:column; gap:18px; }
  .rps-stage { background: var(--bg2); border:1px solid var(--border); border-radius:5px; padding:24px; }
  .player-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; }
  .player-row .name { font-size:18px; color:#fff; letter-spacing:1px; }
  .player-row .score { font-size:32px; color:var(--accent); font-weight:700; }
  .choices { display:flex; gap:18px; justify-content:center; margin-top:24px; }
  .choice-btn {
    background: var(--bg3); border:2px solid var(--border); padding:24px;
    border-radius:5px; cursor:pointer; font-size:48px; min-width: 110px; text-align:center;
    transition: border-color .12s, transform .1s;
  }
  .choice-btn:hover:not([disabled]) { border-color: var(--accent); transform: translateY(-2px); }
  .choice-btn.selected { border-color: var(--accent); background: rgba(75,158,255,.12); }
  .choice-btn[disabled] { opacity: .45; cursor: not-allowed; }
  .status { text-align:center; color:var(--dim); font-size:14px; letter-spacing:1px; min-height:18px; margin-top:14px; }
  .countdown { color:var(--gold); font-weight:700; }
  .result-banner { font-size:36px; letter-spacing:5px; text-align:center; font-weight:700; padding:18px 0; }
  .result-banner.win  { color: var(--green); }
  .result-banner.lose { color: var(--red); }
  .result-banner.draw { color: var(--dim); }
  .bet-row { display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap; }
  .bet-row label { font-size:11px;color:var(--dim);letter-spacing:1px; }
  .bet-row input { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:9px 12px; border-radius:3px; font-family:var(--font); font-size:16px; width:140px; outline:none; }
  .bet-row input:focus { border-color: var(--accent); }
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">ROCK · PAPER · SCISSORS</h1>
  <p class="subtitle">Best of 3, server-decided, real-time PvP.</p>

  <div id="lobby-view" class="card">
    <h3 style="font-size:14px;letter-spacing:2px;color:var(--dim);margin-bottom:14px;">FIND A MATCH</h3>
    <div class="bet-row">
      <div>
        <label>BET AMOUNT (cr)</label>
        <input id="bet" type="number" min="1" step="1" value="50">
      </div>
      <button class="btn purple" id="find-btn">FIND MATCH</button>
      <button class="btn secondary" id="cancel-btn" style="display:none">CANCEL</button>
    </div>
    <p class="status" id="lobby-status"></p>
  </div>

  <div id="match-view" class="rps-board" style="display:none">
    <div class="rps-stage">
      <div class="player-row">
        <span class="name" id="you-name">YOU</span>
        <span class="score" id="you-score">0</span>
      </div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div class="player-row">
        <span class="name" id="opp-name">OPPONENT</span>
        <span class="score" id="opp-score">0</span>
      </div>
      <div class="status" id="round-status">Waiting for round…</div>
      <div class="choices">
        <button class="choice-btn" data-c="rock">✊</button>
        <button class="choice-btn" data-c="paper">✋</button>
        <button class="choice-btn" data-c="scissors">✌️</button>
      </div>
    </div>
    <div id="result" style="display:none" class="rps-stage">
      <div class="result-banner" id="result-banner"></div>
      <div style="text-align:center; margin-top:8px;">
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
        <a class="btn secondary" href="/dashboard.html">BACK TO HUB</a>
      </div>
    </div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/rps.js"></script>
</body>
</html>
