<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Wheel · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg);
  color: var(--text);
}
.w-wrap {
  max-width: 1280px; margin: 0 auto; padding: 18px 18px 80px;
}
.w-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.w-head .title {
  font-size: 22px; letter-spacing: 4px; color: #fff;
}
.w-head .phase {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; letter-spacing: 2px; color: var(--dim);
}
.w-head .phase.live  { color: #7fd97a; }
.w-head .phase.spin  { color: #ffce4a; }
.w-head .phase.result { color: #79e0ff; }

.w-stage {
  display: grid;
  grid-template-columns: 280px 1fr 80px;
  gap: 16px;
  align-items: stretch;
}
.w-side, .w-strip {
  background: rgba(255,255,255,0.015);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 16px;
}
.w-center {
  background: rgba(255,255,255,0.015);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 22px 16px;
  display: flex; align-items: center; justify-content: center;
  min-height: 480px;
  position: relative;
}
.w-canvas-wrap {
  position: relative;
  width: 500px; height: 500px;
  max-width: 100%;
}
#w-canvas {
  width: 100%; height: 100%; display: block;
  filter: drop-shadow(0 6px 22px rgba(0,0,0,0.55));
}
/* Grey downward pointer at the BOTTOM of the ring (6 o'clock), matching
   the reference design. drawWheel()/spinTo() land the winning segment at
   the bottom so the colour under this marker is the one that's announced. */
.w-pointer {
  position: absolute; left: 50%; bottom: 30px;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 11px solid transparent;
  border-right: 11px solid transparent;
  border-top: 18px solid #aeb6c0;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.7));
  z-index: 3;
}
.w-center-info {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: none;
}
.w-countdown {
  font-size: 64px; font-weight: 700; color: #fff;
  text-shadow: 0 4px 18px rgba(0,0,0,0.7);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.w-countdown.warn { color: #ffce4a; }
.w-spin-label {
  font-size: 18px; letter-spacing: 4px; color: #ffce4a;
}
.w-result-label {
  font-size: 32px; letter-spacing: 4px; font-weight: 700;
}

/* Bet panel */
.w-balance {
  display: flex; align-items: baseline; gap: 8px;
  font-size: 18px; font-weight: 700; margin-bottom: 14px;
  padding: 12px 14px;
  background: rgba(127, 217, 122, 0.06);
  border: 1px solid rgba(127, 217, 122, 0.28);
  border-radius: 6px;
}
.w-balance .icon { color: #7fd97a; font-size: 14px; }
.w-balance .val {
  font-variant-numeric: tabular-nums;
  color: #7fd97a;
  text-shadow: 0 0 8px rgba(127, 217, 122, 0.45);
  font-size: 22px;
  letter-spacing: 1px;
  flex: 1;
}
.w-balance .cr { color: rgba(127, 217, 122, 0.7); font-size: 11px; letter-spacing: 2px; font-weight: 400; }
/* Tiny "+xxxx" floater that flashes the credit gain after a win — appears
   to the right of the balance for ~1.4s before fading. */
.w-balance .delta {
  font-size: 14px; color: #7fd97a;
  text-shadow: 0 0 6px rgba(127, 217, 122, 0.7);
  opacity: 0;
  transition: opacity .25s, transform .8s ease-out;
  transform: translateY(0);
  font-variant-numeric: tabular-nums;
}
.w-balance .delta.show {
  opacity: 1;
  transform: translateY(-6px);
}

/* "YOU WON" toast — appears over the wheel for ~2.4s on a winning spin. */
.w-win-toast {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.6);
  background: rgba(12, 18, 22, 0.96);
  border: 2px solid #7fd97a;
  padding: 18px 38px;
  font-size: 14px; letter-spacing: 4px;
  color: #7fd97a; text-align: center;
  border-radius: 10px;
  box-shadow: 0 0 36px rgba(127, 217, 122, 0.55),
              inset 0 0 18px rgba(127, 217, 122, 0.18);
  pointer-events: none;
  opacity: 0;
  z-index: 5;
  transition: opacity .25s, transform .35s cubic-bezier(.34,1.56,.64,1);
  font-weight: 700;
}
.w-win-toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.w-win-toast .amt {
  display: block;
  font-size: 44px;
  margin-top: 6px;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
}
.w-win-toast .net {
  display: block;
  font-size: 12px; letter-spacing: 2px;
  color: rgba(127, 217, 122, 0.75);
  margin-top: 4px;
}
/* Loss toast — same shape, red palette, shorter dwell. */
.w-win-toast.loss {
  border-color: #ff8080;
  color: #ff8080;
  box-shadow: 0 0 24px rgba(255, 128, 128, 0.4);
}
.w-win-toast.loss .net { color: rgba(255, 128, 128, 0.7); }

.w-shortcuts {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  font-size: 11px; letter-spacing: 1px; color: var(--dim);
  margin-bottom: 6px;
}
.w-shortcuts button {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #cdd4dc;
  padding: 6px 4px; font-size: 11px; cursor: pointer;
  font-family: inherit; letter-spacing: 1px;
}
.w-shortcuts button:hover { background: rgba(255,255,255,0.08); }

.w-amount-input {
  width: 100%; box-sizing: border-box;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  padding: 12px 14px; font-size: 18px;
  font-family: inherit; font-variant-numeric: tabular-nums;
  border-radius: 4px;
  margin: 10px 0 8px;
}
.w-amount-input:focus { outline: none; border-color: var(--gold); }

/* Undo bet row — sits between the amount input and the message strip. */
.w-undo-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  margin-bottom: 10px;
}
.w-undo-row button {
  background: rgba(255, 100, 100, 0.05);
  border: 1px solid rgba(255, 100, 100, 0.32);
  color: #ff9b9b;
  padding: 9px 8px; font-size: 11px; letter-spacing: 2px;
  cursor: pointer; font-family: inherit; font-weight: 700;
  border-radius: 4px;
  transition: background .12s, border-color .12s, transform .08s;
}
.w-undo-row button:hover:not(:disabled) {
  background: rgba(255, 100, 100, 0.14);
  border-color: rgba(255, 100, 100, 0.55);
  transform: translateY(-1px);
}
.w-undo-row button:disabled {
  opacity: 0.32; cursor: not-allowed;
}

.w-quick {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-bottom: 4px;
}
.w-quick button {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: #cdd4dc;
  padding: 8px 4px; font-size: 11px; cursor: pointer;
  font-family: inherit; letter-spacing: 1px;
}
.w-quick button:hover { background: rgba(255,255,255,0.08); }

.w-history-title {
  font-size: 10px; letter-spacing: 2px; color: var(--dim);
  margin-top: 18px; margin-bottom: 8px; text-transform: uppercase;
}
.w-mine-list {
  display: flex; flex-direction: column; gap: 4px;
  font-size: 12px;
}
.w-mine-row {
  display: flex; justify-content: space-between;
  background: rgba(255,255,255,0.03);
  border-radius: 3px; padding: 6px 10px;
}
.w-mine-row.empty { color: var(--dim); justify-content: center; }
.w-mine-amount { font-variant-numeric: tabular-nums; font-weight: 700; color: #fff; }

/* Right history strip */
.w-strip {
  display: flex; flex-direction: column; gap: 4px;
  align-items: center; padding: 16px 10px;
  max-height: 440px; overflow-y: auto;
}
.w-strip::-webkit-scrollbar { width: 5px; }
.w-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
.w-strip-title {
  font-size: 9px; letter-spacing: 2px; color: var(--dim);
  margin-bottom: 6px; text-transform: uppercase;
  writing-mode: horizontal-tb;
}
.w-strip-bar {
  width: 28px; height: 7px; border-radius: 3px;
  position: relative; flex-shrink: 0;
}
.w-strip-bar.fresh { box-shadow: 0 0 8px currentColor; }

/* Color bet buttons row */
.w-bets {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-top: 18px;
}
.w-bet {
  background: rgba(255,255,255,0.02);
  border: 2px solid;
  border-radius: 6px;
  padding: 18px 16px 16px;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex; flex-direction: column;
}
.w-bet:hover { transform: translateY(-2px); }
.w-bet:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.w-bet .top {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--dim);
  letter-spacing: 1px; margin-bottom: 12px;
  font-variant-numeric: tabular-nums;
}
.w-bet .top .mine {
  background: rgba(255,255,255,0.05);
  padding: 2px 6px; border-radius: 3px;
  color: #fff;
}
.w-bet .mult {
  font-size: 40px; font-weight: 700; letter-spacing: 2px;
  text-align: center; margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.w-bet .bottom {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--dim); letter-spacing: 1px;
  font-variant-numeric: tabular-nums;
}
.w-bet.gray   { border-color: rgba(180,180,180,0.45); color: #c9d2dc; }
.w-bet.pink   { border-color: rgba(232, 84, 168, 0.55); color: #ff5cb0; }
.w-bet.blue   { border-color: rgba(0, 215, 255, 0.55); color: #29c6ff; }
.w-bet.yellow { border-color: rgba(255, 206, 74, 0.6);  color: #ffce4a; }
.w-bet.gray:hover   { background: rgba(180,180,180,0.06); }
.w-bet.pink:hover   { background: rgba(232, 84, 168, 0.06); }
.w-bet.blue:hover   { background: rgba(0, 215, 255, 0.06); }
.w-bet.yellow:hover { background: rgba(255, 206, 74, 0.06); }
.w-bet.win-flash {
  animation: betWinFlash 1s ease-in-out 3;
}
@keyframes betWinFlash {
  0%, 100% { background: rgba(255,255,255,0.02); }
  50%      { background: rgba(127, 217, 122, 0.16); border-color: #7fd97a !important; }
}

.w-msg {
  margin-top: 10px; padding: 8px 12px;
  font-size: 12px; letter-spacing: 1px;
  border-radius: 4px; display: none;
}
.w-msg.ok    { background: rgba(127, 217, 122, 0.08); border: 1px solid rgba(127, 217, 122, 0.4); color: #7fd97a; display: block; }
.w-msg.error { background: rgba(255, 100, 100, 0.08); border: 1px solid rgba(255, 100, 100, 0.4); color: #ff8080; display: block; }

@media (max-width: 900px) {
  .w-stage { grid-template-columns: 1fr; }
  .w-strip { flex-direction: row; flex-wrap: wrap; }
  .w-bets { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="topbar" id="topbar"></div>

<div class="w-wrap">
  <div class="w-head">
    <div class="title">WHEEL</div>
    <div class="phase" id="w-phase">— · —</div>
  </div>

  <div class="w-stage">
    <!-- Bet panel (left) -->
    <div class="w-side">
      <div class="w-balance">
        <span class="icon">●</span>
        <span class="val" id="w-balance">—</span>
        <span class="cr">CR</span>
        <span class="delta" id="w-balance-delta"></span>
      </div>

      <div class="w-shortcuts">
        <button data-act="clear">Clear</button>
        <button data-act="+10">+10</button>
        <button data-act="+100">+100</button>
        <button data-act="+1k">+1k</button>
        <button data-act="+10k">+10k</button>
        <button data-act="half">1/2</button>
        <button data-act="double">2x</button>
        <button data-act="max">Max</button>
      </div>

      <input type="number" id="w-amount" class="w-amount-input" min="0" step="1" value="0" placeholder="0">

      <div class="w-undo-row">
        <button id="w-undo-last" disabled title="Refund the most recent bet you placed this round">↶ UNDO LAST</button>
        <button id="w-undo-all"  disabled title="Refund every bet you placed this round">⨯ UNDO ALL</button>
      </div>

      <div id="w-msg" class="w-msg"></div>

      <div class="w-history-title">Your bets this round</div>
      <div id="w-mine" class="w-mine-list">
        <div class="w-mine-row empty">No bets placed yet</div>
      </div>
    </div>

    <!-- Wheel (center) -->
    <div class="w-center">
      <div class="w-canvas-wrap">
        <canvas id="w-canvas" width="1000" height="1000"></canvas>
        <div class="w-pointer"></div>
        <div class="w-win-toast" id="w-win-toast"></div>
      </div>
      <div class="w-center-info" id="w-center-info"></div>
    </div>

    <!-- History strip (right) — past 16 results -->
    <div class="w-strip">
      <div class="w-strip-title">Hist</div>
      <div id="w-strip-host" style="display:flex;flex-direction:column;gap:4px;"></div>
    </div>
  </div>

  <!-- Color bet buttons -->
  <div class="w-bets">
    <button class="w-bet gray"   data-color="gray">
      <div class="top"><span class="total" id="w-tot-gray">0</span><span class="mine" id="w-mine-gray">0</span></div>
      <div class="mult">2x</div>
      <div class="bottom"><span>Total</span><span>You</span></div>
    </button>
    <button class="w-bet pink"   data-color="pink">
      <div class="top"><span class="total" id="w-tot-pink">0</span><span class="mine" id="w-mine-pink">0</span></div>
      <div class="mult">3x</div>
      <div class="bottom"><span>Total</span><span>You</span></div>
    </button>
    <button class="w-bet blue"   data-color="blue">
      <div class="top"><span class="total" id="w-tot-blue">0</span><span class="mine" id="w-mine-blue">0</span></div>
      <div class="mult">5x</div>
      <div class="bottom"><span>Total</span><span>You</span></div>
    </button>
    <button class="w-bet yellow" data-color="yellow">
      <div class="top"><span class="total" id="w-tot-yellow">0</span><span class="mine" id="w-mine-yellow">0</span></div>
      <div class="mult">50x</div>
      <div class="bottom"><span>Total</span><span>You</span></div>
    </button>
  </div>
</div>

<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/music-player.js"></script>
<script>
// ── Color palette for canvas + strip ──────────────────────────────────────
const COLORS = {
  gray:   { hex: '#5a6371', glow: '#a7b1bd' },
  pink:   { hex: '#e8479d', glow: '#ff7cbf' },
  blue:   { hex: '#00d7ff', glow: '#7befff' },
  yellow: { hex: '#ffce4a', glow: '#fff094' },
};

const state = {
  socket: null, balance: 0,
  layout: [], totals: { gray:0, pink:0, blue:0, yellow:0 },
  mine: { gray:0, pink:0, blue:0, yellow:0 },
  phase: 'idle', phaseEndsAt: 0, history: [],
  result: null, // last spin result while phase==='result'
  // Animation state for the wheel.
  currentAngle: 0,   // current rotation in radians
  spinStartedAt: 0,
  spinFromAngle: 0,
  spinToAngle: 0,
  spinDurationMs: 5000,
  spinningWheel: false,
};

// ── Canvas drawing ────────────────────────────────────────────────────────
const canvas = document.getElementById('w-canvas');
const ctx    = canvas.getContext('2d');

// Multiplier lookup so we don't recreate the table on every draw.
// Ring geometry (canvas is 1000×1000, shown at 500 → 2× downscale).
const RING_R       = 450;    // centreline radius of the tick ring
const TICK_THICK   = 22;     // radial thickness of each tick
const TICK_GAP_RAD = 0.052;  // angular gap between ticks

// Draw the wheel as a thin ring of discrete rounded colour ticks — one
// per segment — matching the reference design. No filled disc, gold ring,
// gradient or in-ring numbers; the centre stays empty. Each tick is a
// short round-capped arc stroke, which gives the rounded-dash look.
function drawWheel() {
  const w = canvas.width, h = canvas.height;
  const cx = w / 2, cy = h / 2;
  ctx.clearRect(0, 0, w, h);
  if (!state.layout?.length) return;

  const N = state.layout.length;
  const seg = (Math.PI * 2) / N;
  const half = Math.max(0.005, (seg - TICK_GAP_RAD) / 2);
  ctx.lineWidth = TICK_THICK;
  ctx.lineCap = 'round';
  for (let i = 0; i < N; i++) {
    // Segment i's centre angle. Base -π/2 + currentAngle keeps the spin
    // maths consistent with spinTo (which lands the winner at the bottom).
    const center = -Math.PI / 2 + state.currentAngle + i * seg;
    const col = COLORS[state.layout[i]] || COLORS.gray;
    ctx.beginPath();
    ctx.arc(cx, cy, RING_R, center - half, center + half);
    ctx.strokeStyle = col.hex;
    ctx.stroke();
  }
}

function spinTo(segmentIndex, durationMs) {
  if (!state.layout?.length) return;
  const N = state.layout.length;
  const seg = (Math.PI * 2) / N;
  // Land segment `segmentIndex` under the pointer at the BOTTOM (+π/2).
  // Segment i's centre angle is (-π/2 + currentAngle + i*seg), so to put
  // segmentIndex at +π/2 we need currentAngle ≡ π - segmentIndex*seg.
  const target = Math.PI - segmentIndex * seg;
  // Normalize current angle into (-π, π] for stable maths.
  const cur = state.currentAngle % (Math.PI * 2);
  let delta = ((target - cur) % (Math.PI * 2));
  // Always go negative (clockwise visually) and add 5 full rotations.
  if (delta > 0) delta -= Math.PI * 2;
  delta -= Math.PI * 2 * 5;
  state.spinFromAngle = state.currentAngle;
  state.spinToAngle = state.currentAngle + delta;
  state.spinStartedAt = performance.now();
  state.spinDurationMs = durationMs;
  state.spinningWheel = true;
  requestAnimationFrame(spinTick);
}

function spinTick(ts) {
  const elapsed = ts - state.spinStartedAt;
  const t = Math.min(1, elapsed / state.spinDurationMs);
  // ease-out cubic — slow start (the server-side spin pause), then fast,
  // then slow into the result.
  const k = 1 - Math.pow(1 - t, 3);
  state.currentAngle = state.spinFromAngle + (state.spinToAngle - state.spinFromAngle) * k;
  drawWheel();
  if (t < 1) requestAnimationFrame(spinTick);
  else { state.spinningWheel = false; state.currentAngle = state.spinToAngle; }
}

// ── UI rendering ──────────────────────────────────────────────────────────
function fmt(n) { return Number(n || 0).toLocaleString(); }
function fmtBalance() { document.getElementById('w-balance').textContent = fmt(state.balance); }

// Small "+1,234" / "-50" flash next to the balance after a win/loss.
function flashBalanceDelta(delta) {
  if (!Number.isFinite(delta) || delta === 0) return;
  const el = document.getElementById('w-balance-delta');
  if (!el) return;
  el.textContent = (delta >= 0 ? '+' : '') + fmt(delta);
  el.style.color = delta >= 0 ? '#7fd97a' : '#ff8080';
  el.style.textShadow = delta >= 0
    ? '0 0 6px rgba(127, 217, 122, 0.7)'
    : '0 0 6px rgba(255, 128, 128, 0.7)';
  // Restart animation by toggling the class.
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  clearTimeout(flashBalanceDelta._t);
  flashBalanceDelta._t = setTimeout(() => el.classList.remove('show'), 1400);
}

// Big toast over the wheel showing the player's win/loss for this round.
// payout = gross credits received from the winning colour; netChange =
// payout minus everything they bet across all colours.
function showResultToast({ payout, netChange, winColor, multiplier, lost }) {
  const el = document.getElementById('w-win-toast');
  if (!el) return;
  if (lost) {
    el.classList.add('loss');
    el.innerHTML = `
      <div>LOST THIS ROUND</div>
      <span class="amt">−${fmt(Math.abs(netChange))}</span>
      <span class="net">${winColor.toUpperCase()} ${multiplier}× — none of your bets</span>`;
  } else {
    el.classList.remove('loss');
    el.innerHTML = `
      <div>YOU WON</div>
      <span class="amt">+${fmt(payout)}</span>
      <span class="net">net ${netChange >= 0 ? '+' : ''}${fmt(netChange)} · ${multiplier}× on ${winColor}</span>`;
  }
  el.classList.add('show');
  clearTimeout(showResultToast._t);
  showResultToast._t = setTimeout(() => el.classList.remove('show'), 2600);
}

function renderPhase() {
  const phaseEl = document.getElementById('w-phase');
  const infoEl  = document.getElementById('w-center-info');
  const ms = Math.max(0, (state.phaseEndsAt || 0) - Date.now());
  const sec = Math.ceil(ms / 1000);
  phaseEl.className = 'phase ' + (state.phase === 'betting' ? 'live'
                              : state.phase === 'spinning' ? 'spin'
                              : state.phase === 'result'   ? 'result' : '');
  if (state.phase === 'betting') {
    phaseEl.textContent = `BETTING · ${sec}s`;
    infoEl.innerHTML = `<div class="w-countdown ${sec <= 5 ? 'warn' : ''}">${sec}</div>`;
  } else if (state.phase === 'spinning') {
    phaseEl.textContent = 'SPINNING';
    infoEl.innerHTML = `<div class="w-spin-label">SPINNING…</div>`;
  } else if (state.phase === 'result' && state.result) {
    phaseEl.textContent = `LANDED ${state.result.color.toUpperCase()} ${state.result.multiplier}x`;
    const col = COLORS[state.result.color] || COLORS.gray;
    infoEl.innerHTML = `<div class="w-result-label" style="color:${col.glow};text-shadow:0 0 16px ${col.hex};">${state.result.multiplier}×</div>`;
  } else {
    phaseEl.textContent = '— · —';
    infoEl.innerHTML = '';
  }
}

function renderTotals() {
  for (const c of ['gray','pink','blue','yellow']) {
    const el = document.getElementById('w-tot-' + c);
    if (el) el.textContent = fmt(state.totals[c]);
    const meEl = document.getElementById('w-mine-' + c);
    if (meEl) meEl.textContent = fmt(state.mine[c]);
  }
}

function renderMine() {
  const host = document.getElementById('w-mine');
  const rows = [];
  for (const c of ['gray','pink','blue','yellow']) {
    if (state.mine[c] > 0) {
      const col = COLORS[c];
      const mult = { gray:2, pink:3, blue:5, yellow:50 }[c];
      rows.push(`<div class="w-mine-row">
        <span style="color:${col.hex};">${mult}x</span>
        <span class="w-mine-amount">${fmt(state.mine[c])} cr</span>
      </div>`);
    }
  }
  host.innerHTML = rows.length ? rows.join('') : '<div class="w-mine-row empty">No bets placed yet</div>';
}

function renderHistory() {
  const host = document.getElementById('w-strip-host');
  host.innerHTML = '';
  for (let i = 0; i < state.history.length; i++) {
    const h = state.history[i];
    const col = COLORS[h.color] || COLORS.gray;
    const bar = document.createElement('div');
    bar.className = 'w-strip-bar' + (i === 0 ? ' fresh' : '');
    bar.style.background = col.hex;
    bar.style.color = col.glow;
    bar.title = `${h.multiplier}x — ${new Date(h.spunAt).toLocaleTimeString()}`;
    host.appendChild(bar);
  }
}

function renderBetButtons() {
  const canBet = state.phase === 'betting';
  for (const b of document.querySelectorAll('.w-bet')) {
    b.disabled = !canBet;
    b.classList.remove('win-flash');
  }
  if (state.phase === 'result' && state.result) {
    const win = document.querySelector('.w-bet.' + state.result.color);
    if (win) win.classList.add('win-flash');
  }
}

function showMsg(text, kind) {
  const el = document.getElementById('w-msg');
  el.className = 'w-msg ' + (kind || '');
  el.textContent = text;
  if (kind === 'ok') setTimeout(() => { el.className = 'w-msg'; }, 2500);
}

// ── Bet input wiring ──────────────────────────────────────────────────────
const amountEl = document.getElementById('w-amount');
function getAmount() {
  const n = Math.max(0, Math.floor(Number(amountEl.value) || 0));
  return n;
}
function setAmount(n) {
  amountEl.value = Math.max(0, Math.floor(Math.min(state.balance, n || 0)));
}
document.querySelectorAll('.w-shortcuts button').forEach(b => {
  b.addEventListener('click', () => {
    const act = b.dataset.act;
    const cur = getAmount();
    switch (act) {
      case 'clear':  setAmount(0); break;
      case '+10':    setAmount(cur + 10); break;
      case '+100':   setAmount(cur + 100); break;
      case '+1k':    setAmount(cur + 1000); break;
      case '+10k':   setAmount(cur + 10000); break;
      case 'half':   setAmount(Math.floor(cur / 2)); break;
      case 'double': setAmount(cur * 2); break;
      case 'max':    setAmount(state.balance); break;
    }
  });
});

document.querySelectorAll('.w-bet').forEach(b => {
  b.addEventListener('click', () => {
    if (state.phase !== 'betting') return;
    const amount = getAmount();
    if (amount <= 0) { showMsg('Enter an amount first.', 'error'); return; }
    if (amount > state.balance) { showMsg('Not enough credits.', 'error'); return; }
    const color = b.dataset.color;
    b.disabled = true;
    state.socket.emit('wheel_bet', { color, amount }, (res) => {
      b.disabled = false;
      if (res?.error) {
        showMsg({
          not_betting_phase: 'Betting closed for this round.',
          invalid_color:     'Invalid colour.',
          invalid_amount:    'Invalid amount.',
          amount_too_large:  'Amount is too large.',
          insufficient_balance: 'Not enough credits.',
        }[res.error] || res.error, 'error');
        return;
      }
      state.balance = res.balance;
      state.totals  = res.totals;
      state.mine    = res.mine;
      fmtBalance(); renderTotals(); renderMine(); updateUndoButtons();
      // Keep the input but cap it at the new balance.
      setAmount(Math.min(getAmount(), state.balance));
      showMsg(`Bet ${fmt(amount)} on ${color}.`, 'ok');
    });
  });
});

// Toggle the undo buttons based on (a) we're in the betting phase, and
// (b) the user actually has at least one bet placed this round. Called
// whenever phase or state.mine changes.
function updateUndoButtons() {
  const canUndo = state.phase === 'betting'
    && ['gray','pink','blue','yellow'].some(c => Number(state.mine?.[c] || 0) > 0);
  const a = document.getElementById('w-undo-last');
  const b = document.getElementById('w-undo-all');
  if (a) a.disabled = !canUndo;
  if (b) b.disabled = !canUndo;
}

document.getElementById('w-undo-last').addEventListener('click', () => {
  const btn = document.getElementById('w-undo-last');
  btn.disabled = true;
  state.socket.emit('wheel_undo_last', {}, (res) => {
    if (res?.error) {
      showMsg({
        not_betting_phase: 'Betting already closed — too late to undo.',
        no_bets_to_undo:   'You have no bets to undo.',
      }[res.error] || res.error, 'error');
      updateUndoButtons();
      return;
    }
    state.balance = res.balance;
    state.totals  = res.totals;
    state.mine    = res.mine;
    fmtBalance(); renderTotals(); renderMine(); updateUndoButtons();
    if (res.undone) {
      showMsg(`Undid ${fmt(res.undone.amount)} cr on ${res.undone.color}.`, 'ok');
      flashBalanceDelta(res.undone.amount);
    }
  });
});

document.getElementById('w-undo-all').addEventListener('click', () => {
  const btn = document.getElementById('w-undo-all');
  btn.disabled = true;
  state.socket.emit('wheel_undo_all', {}, (res) => {
    if (res?.error) {
      showMsg({
        not_betting_phase: 'Betting already closed — too late to undo.',
        no_bets_to_undo:   'You have no bets to undo.',
      }[res.error] || res.error, 'error');
      updateUndoButtons();
      return;
    }
    state.balance = res.balance;
    state.totals  = res.totals;
    state.mine    = res.mine;
    fmtBalance(); renderTotals(); renderMine(); updateUndoButtons();
    if (res.refunded) {
      showMsg(`Refunded ${fmt(res.refunded)} cr across all bets.`, 'ok');
      flashBalanceDelta(res.refunded);
    }
  });
});

// ── Socket wiring ─────────────────────────────────────────────────────────
async function start() {
  const user = await renderTopbar();
  if (!user) return;
  state.balance = Number(user.balance) || 0;
  fmtBalance();

  const sock = io('/wheel', { withCredentials: true, transports: ['websocket','polling'] });
  state.socket = sock;
  sock.on('connect_error', e => console.warn('[wheel] connect_error', e.message));

  sock.on('wheel_state', (s) => {
    // New-round detection — if the round id moved on, zero out our
    // local view of "this round's bets" so the bet panel doesn't keep
    // showing last round's stake. Server's wheel_balance also pushes
    // a fresh mine={} after a payout but a fresh state from a tab join
    // mid-round only carries totals, not personal stake.
    if (s.roundId && s.roundId !== state.lastSeenRoundId) {
      state.lastSeenRoundId = s.roundId;
      // Only reset mine when a *new* betting round opens. During spin/
      // result we want to keep showing what we bet so the toast can
      // reference it.
      if (s.phase === 'betting') {
        state.mine = { gray:0, pink:0, blue:0, yellow:0 };
        renderMine();
      }
    }
    state.layout = s.layout || state.layout;
    state.totals = s.totals || state.totals;
    state.phase = s.phase;
    state.phaseEndsAt = s.phaseEndsAt;
    state.history = s.history || [];
    state.result = s.result || null;
    drawWheel();
    renderPhase(); renderTotals(); renderHistory(); renderBetButtons();
    updateUndoButtons();
  });

  sock.on('wheel_balance', (d) => {
    if (typeof d.balance === 'number') {
      // Animate balance jumps so wins/losses register visually. Skip the
      // floater for refunds/undos — those callers already flashed it
      // with the exact undone amount via their cb handler.
      const delta = d.balance - state.balance;
      state.balance = d.balance;
      // Only auto-flash for non-undo changes (place bet, payout). Undo
      // flashes were already triggered with a friendlier message.
      if (Math.abs(delta) >= 1 && !d._undo) flashBalanceDelta(delta);
    }
    state.mine = d.mine || state.mine;
    fmtBalance(); renderTotals(); renderMine(); updateUndoButtons();
  });

  sock.on('wheel_bet_update', (d) => {
    state.totals = d.totals || state.totals;
    state.phaseEndsAt = d.phaseEndsAt || state.phaseEndsAt;
    renderTotals();
  });

  sock.on('wheel_spin_start', (d) => {
    // Spin animation runs for the server's phase duration so the wheel
    // settles exactly when the server flips to 'result'.
    state.phaseEndsAt = d.phaseEndsAt;
    state.phase = 'spinning';
    const dur = Math.max(800, d.phaseEndsAt - d.serverNow);
    spinTo(d.segment, dur);
    updateUndoButtons();
  });

  sock.on('wheel_result', (d) => {
    state.result = { color: d.color, multiplier: d.multiplier, segment: d.segment };
    state.history = d.history || state.history;
    state.totals = d.totals || state.totals;
    renderTotals(); renderHistory(); renderBetButtons(); renderPhase();

    // Win/loss toast. Computed locally from our own bet snapshot so we
    // don't have to wait for wheel_balance to roundtrip — the math is:
    //   bet on winning colour × multiplier = gross payout
    //   payout − sum of all our bets       = net change for the round
    const myWinBet = Number(state.mine?.[d.color] || 0);
    const myTotalBet = ['gray','pink','blue','yellow'].reduce(
      (s, c) => s + Number(state.mine?.[c] || 0), 0);
    if (myTotalBet > 0) {
      if (myWinBet > 0) {
        const payout = myWinBet * d.multiplier;
        showResultToast({
          payout, netChange: payout - myTotalBet,
          winColor: d.color, multiplier: d.multiplier, lost: false,
        });
      } else {
        showResultToast({
          payout: 0, netChange: -myTotalBet,
          winColor: d.color, multiplier: d.multiplier, lost: true,
        });
      }
    }
  });

  drawWheel();
  // Tick the visible countdown.
  setInterval(renderPhase, 250);
}

start();
</script>

</html>
