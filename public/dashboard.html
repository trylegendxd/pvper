<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Hub · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="topbar" id="topbar"></div>
<div class="container">
  <h1 class="page">GAME HUB</h1>
  <p class="subtitle">Pick a game. All credits are play-money only.</p>

  <div class="game-grid">
    <a class="game-card shooter" href="/games/shooter.html">
      <div class="icon">🎯</div>
      <h3>SHOOTER ARENA</h3>
    </a>
    <a class="game-card rps" href="/games/rps.html">
      <div class="icon">✊</div>
      <h3>ROCK PAPER SCISSORS</h3>
    </a>
    <a class="game-card roulette" href="/games/roulette.html">
      <div class="icon">🎡</div>
      <h3>ROULETTE</h3>
    </a>
    <a class="game-card blackjack" href="/games/blackjack.html">
      <div class="icon">🂡</div>
      <h3>BLACKJACK</h3>
    </a>
    <a class="game-card" href="/games/mines.html" style="border-color:rgba(241,196,15,.35)">
      <div class="icon">💣</div>
      <h3>MINES</h3>
    </a>
    <a class="game-card" href="/games/wheel.html" style="border-color:rgba(0,215,255,.45)">
      <div class="icon">🎰</div>
      <h3>WHEEL</h3>
    </a>
    <a class="game-card" href="/games/russian-roulette.html" style="border-color:rgba(255,59,78,.5)">
      <div class="icon">🔫</div>
      <h3>RUSSIAN ROULETTE</h3>
    </a>
    <a class="game-card wallet" href="/wallet.html">
      <div class="icon">💳</div>
      <h3>WALLET</h3>
    </a>
    <a class="game-card admin" href="/admin.html" id="admin-card" style="display:none">
      <div class="icon">🛠️</div>
      <h3>ADMIN PANEL</h3>
    </a>
  </div>

  <!-- Friends + chat -->
  <h2 class="page" style="margin-top:32px;font-size:22px;">SOCIAL</h2>
  <div id="friends-root" class="friends-root">
    <div class="friends-empty">Loading friends…</div>
  </div>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/dollar-rain.js"></script>
<script src="/js/music-player.js"></script>
<script src="/js/notifications.js"></script>
<script src="/js/friends.js"></script>
<script>
(async () => {
  const user = await renderTopbar();
  if (user?.is_admin) document.getElementById('admin-card').style.display = '';
  if (window.FriendsPanel) FriendsPanel.init();
})();
</script>
</body>
</html>
