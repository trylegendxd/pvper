<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login · FPS Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="form-box">
  <h1>FPS ARENA</h1>
  <div class="row"><label>Username</label><input id="u" autocomplete="username" maxlength="24"></div>
  <div class="row"><label>Password</label><input id="p" type="password" autocomplete="current-password"></div>
  <button class="btn" id="go">LOGIN</button>
  <p class="error" id="err"></p>
  <p style="text-align:center;color:var(--dim);font-size:12px;">
    No account? <a href="/register.html">Register here</a>
  </p>
</div>
<div class="legal-footer">Credits are fictional play-money credits only and have no real-world monetary value.</div>

<script src="/js/api.js"></script>
<script>
const $ = id => document.getElementById(id);
async function doLogin() {
  $('err').textContent = '';
  $('go').disabled = true;
  try {
    const u = $('u').value.trim();
    const p = $('p').value;
    await api('/api/auth/login', { method: 'POST', body: { username: u, password: p } });
    location.href = '/dashboard.html';
  } catch (e) {
    $('err').textContent = friendly(e.message);
    $('go').disabled = false;
  }
}
function friendly(code) {
  return {
    invalid_credentials: 'Invalid username or password.',
    rate_limited: 'Too many attempts — try again later.',
    invalid_username: 'Username may be 3–24 letters / digits / . _ -',
  }[code] || code;
}
$('go').addEventListener('click', doLogin);
['u','p'].forEach(id => $(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); }));
</script>
</body>
</html>
